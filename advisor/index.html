<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Janet Chen · 顧問後台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0e0c;color:#e8e0d0;font-size:13px}
:root{--gold:#d4af37;--green:#27ae60;--red:#e74c3c;--bg2:#1a1810;--border:#2a2820}
#pw-screen{position:fixed;inset:0;background:#0f0e0c;display:flex;align-items:center;justify-content:center;z-index:9999}
.pw-box{background:#1a1810;border:1.5px solid var(--gold);border-radius:16px;padding:40px 48px;text-align:center;width:360px}
.pw-logo{font-size:2.5rem;margin-bottom:10px}
.pw-box h2{color:var(--gold);font-size:1rem;margin-bottom:6px;letter-spacing:.06em}
.pw-box p{color:#888;font-size:.78rem;margin-bottom:22px}
.pw-input{width:100%;background:#0f0e0c;border:1.5px solid #333;border-radius:8px;padding:10px 14px;color:#e8e0d0;font-size:1rem;outline:none;margin-bottom:12px;text-align:center;letter-spacing:.2em}
.pw-input:focus{border-color:var(--gold)}
.pw-btn{width:100%;padding:10px;background:linear-gradient(135deg,#1a6b3a,#27ae60);border:none;border-radius:8px;color:#fff;font-size:.9rem;font-weight:700;cursor:pointer}
.pw-btn:hover{opacity:.88}
.pw-error{color:var(--red);font-size:.78rem;margin-top:10px;min-height:18px}
#app{display:none;height:100vh;flex-direction:column;overflow:hidden}
.topbar{height:46px;background:#1a1810;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.topbar h1{font-size:.82rem;color:var(--gold);font-weight:700;letter-spacing:.05em}
.tb-badge{background:#1a3a25;color:#5dbb7a;font-size:.62rem;padding:2px 8px;border-radius:20px;font-weight:700}
.tb-count{margin-left:auto;color:#555;font-size:.7rem}
.tb-logout{color:#555;font-size:.7rem;cursor:pointer;padding:3px 8px;border:1px solid #2a2820;border-radius:4px}
.tb-logout:hover{color:#aaa}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:268px;background:#111009;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:9px 12px;border-bottom:1px solid var(--border);font-size:.66rem;color:#555;text-transform:uppercase;letter-spacing:.08em}
.sb-search input{width:100%;background:#0f0e0c;border:none;border-bottom:1px solid var(--border);padding:8px 12px;color:#e8e0d0;font-size:.78rem;outline:none}
.sb-search input:focus{border-bottom-color:var(--gold)}
.cl{flex:1;overflow-y:auto}
.ci{padding:9px 12px;border-bottom:1px solid #171510;cursor:pointer;border-left:3px solid transparent;transition:background .12s}
.ci:hover{background:#1a1810}
.ci.active{background:#1e1c12;border-left-color:var(--gold)}
.ci-name{font-size:.82rem;font-weight:600;color:#e0d8c8}
.ci.active .ci-name{color:var(--gold)}
.ci-sub{display:flex;justify-content:space-between;margin-top:2px}
.ci-date{font-size:.66rem;color:#555}
.ci-net{font-size:.7rem;font-weight:600;color:#7ab88a}
.detail{flex:1;overflow-y:auto;padding:16px 20px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#333;gap:10px;font-size:.85rem}
.empty-arrow{font-size:2rem;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:.8}}
.r-hd{background:#1a1810;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.r-name{font-size:1.05rem;font-weight:700;color:var(--gold);margin-bottom:10px}
.r-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.r-item label{font-size:.62rem;color:#666;text-transform:uppercase;letter-spacing:.04em}
.r-item value{display:block;font-size:.78rem;color:#e0d8c8;font-weight:600;margin-top:1px}
.sum-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.sc{background:#1a1810;border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.sc-label{font-size:.62rem;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.sc-val{font-size:.92rem;font-weight:700;color:#e0d8c8}
.sc-val.pos{color:var(--green)}
.sc-val.neg{color:var(--red)}
.r-sec{background:#1a1810;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:12px}
.r-sec-title{font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.r-sec-title:before{content:'';width:3px;height:12px;background:var(--gold);border-radius:2px;flex-shrink:0}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ftbl{width:100%;border-collapse:collapse;font-size:.75rem}
.ftbl td{padding:4px 5px;border-bottom:1px solid #1e1c14}
.ftbl td:last-child{text-align:right;font-weight:600}
.ftbl .lbl{color:#888}
.ftbl .total td{color:var(--gold);font-weight:700;border-top:1px solid #2a2820;padding-top:6px;border-bottom:none}
.ftbl .pos{color:var(--green)}
.ftbl .neg{color:var(--red)}
.asset-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.abar{flex:1;min-width:90px;background:#141210;border:1px solid var(--border);border-radius:6px;padding:7px 9px}
.abar-lbl{font-size:.62rem;color:#777;margin-bottom:3px;line-height:1.3}
.abar-val{font-size:.76rem;font-weight:700;color:var(--gold)}
.abar-pct{font-size:.62rem;color:#555;margin-top:1px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi{background:#141210;border:1px solid var(--border);border-radius:7px;padding:9px 11px}
.kpi-nm{font-size:.68rem;color:#777;margin-bottom:6px;line-height:1.3;min-height:28px}
.kpi-bottom{display:flex;align-items:center;justify-content:space-between;gap:4px}
.kpi-val{font-size:.84rem;font-weight:700}
.kpi-tgt{font-size:.6rem;color:#555}
.kpi-tag{font-size:.6rem;padding:2px 7px;border-radius:8px;font-weight:700;white-space:nowrap}
.kpi-tag.ok{background:#1a3a25;color:#5dbb7a}
.kpi-tag.fail{background:#3a1a1a;color:#e07070}
.kpi-tag.na{background:#222;color:#555}
.notes{background:#1a1810;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:12px}
.notes textarea{width:100%;background:#0f0e0c;border:1px solid #2a2820;border-radius:6px;padding:7px 9px;color:#e8e0d0;font-size:.78rem;resize:vertical;min-height:60px;outline:none;font-family:inherit}
.notes textarea:focus{border-color:var(--gold)}
.notes-btns{display:flex;gap:8px;margin-top:8px;align-items:center}
.btn-save{padding:5px 14px;background:linear-gradient(135deg,#1a6b3a,#27ae60);border:none;border-radius:5px;color:#fff;font-size:.74rem;font-weight:700;cursor:pointer}
.btn-pdf{padding:5px 14px;background:#1a1810;border:1px solid var(--gold);border-radius:5px;color:var(--gold);font-size:.74rem;cursor:pointer}
.save-ok{color:var(--green);font-size:.7rem;opacity:0;transition:opacity .3s}
@media print{#pw-screen,#app .topbar,.sidebar,.notes-btns{display:none!important}.main{display:block!important}.detail{overflow:visible!important;padding:0!important}}
</style>
</head>
<body>
<div id="pw-screen">
  <div class="pw-box">
    <div class="pw-logo">🔒</div>
    <h2>Janet Chen · 顧問後台</h2>
    <p>請輸入密碼以進入客戶財務報告系統</p>
    <input class="pw-input" type="password" id="pw-inp" placeholder="••••••••" autocomplete="off" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">登錄 &rarr;</button>
    <div class="pw-error" id="pw-err"></div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <h1>Janet Chen &middot; 顧問後台 &middot; 客戶財務報告</h1>
    <span class="tb-badge">保誠 IH5039</span>
    <span class="tb-count" id="rec-count"></span>
    <span class="tb-logout" onclick="logout()">退出</span>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sb-hd">客戶列表</div>
      <div class="sb-search">
        <input type="search" id="srch" placeholder="🔍 搜尋姓名…" oninput="filterList()">
      </div>
      <div class="cl" id="cl">
        <div style="padding:20px;text-align:center;color:#444;font-size:.75rem">載入中…</div>
      </div>
    </div>
    <div class="detail" id="detail">
      <div class="empty">
        <div class="empty-arrow">←</div>
        <div>選擇左側客戶查看完整報告</div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPA_URL='https://harfpcpncdgsseebfsku.supabase.co';
const SUPA_KEY='sb_publishable_XU4HW7YIninAmvzGVbs2GA_ejscsrnu';
const PW='janet2025';
let allRecords=[]; let activeId=null;

function checkPw(){
  const v=document.getElementById('pw-inp').value;
  if(v===PW){
    document.getElementById('pw-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    loadData();
  }else{
    document.getElementById('pw-err').textContent='密碼錯誤，請重試';
    document.getElementById('pw-inp').value='';
    document.getElementById('pw-inp').focus();
  }
}
function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('pw-screen').style.display='flex';
  document.getElementById('pw-inp').value='';
}
async function loadData(){
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/finance_reports?select=*&order=created_at.desc',{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    allRecords=await r.json();
    document.getElementById('rec-count').textContent=allRecords.length+' 個客戶';
    renderList(allRecords);
  }catch(e){
    document.getElementById('cl').innerHTML='<div style="padding:16px;color:#e74c3c;font-size:.75rem">載入失敗: '+e.message+'</div>';
  }
}
function filterList(){
  const q=document.getElementById('srch').value.toLowerCase();
  renderList(allRecords.filter(function(r){return (r.client_name||'').toLowerCase().includes(q);}));
}
function fmt(n,sym){
  sym=sym||'HKD';
  if(n===null||n===undefined||n==='')return 'N/A';
  return sym+' '+Number(n).toLocaleString('en-HK',{maximumFractionDigits:0});
}
function pct(n,dec){
  if(n===null||n===undefined)return 'N/A';
  return (n*100).toFixed(dec===undefined?1:dec)+'%';
}
function renderList(records){
  const cl=document.getElementById('cl');
  if(!records.length){cl.innerHTML='<div style="padding:20px;text-align:center;color:#444;font-size:.75rem">無記錄</div>';return;}
  cl.innerHTML=records.map(function(r){
    const d=r.report_data||{};
    const netVal=d.netAssets||r.net_assets||0;
    const dt=new Date(r.created_at);
    const dtStr=dt.getFullYear()+'-'+(dt.getMonth()+1).toString().padStart(2,'0')+'-'+dt.getDate().toString().padStart(2,'0');
    const netCol=netVal>=0?'#7ab88a':'#e74c3c';
    const sym=d.cur_sym||'HKD';
    const isActive=r.id===activeId?' active':'';
    return '<div class="ci'+isActive+'" data-id="'+r.id+'">'+
      '<div class="ci-name">'+(r.client_name||d.name||'未命名')+'</div>'+
      '<div class="ci-sub"><span class="ci-date">'+dtStr+'</span>'+
      '<span class="ci-net" style="color:'+netCol+'">'+sym+' '+Number(netVal).toLocaleString('en-HK',{maximumFractionDigits:0})+'</span></div>'+
      '</div>';
  }).join('');
}
function showReport(id){
  activeId=id;
  filterList();
  const rec=allRecords.find(function(r){return r.id===id;});
  if(!rec)return;
  const d=rec.report_data||{};
  const sym=d.cur_sym||'HKD';
  const det=document.getElementById('detail');
  const ta=d.totalAssets||rec.total_assets||0;
  const tl=d.debtTotal||rec.total_liabilities||0;
  const na=d.netAssets||rec.net_assets||0;
  const ni=d.netInc||rec.net_income||0;
  const ti=d.totalInc||rec.total_income||0;
  const te=d.totalExp||rec.total_expense||0;
  const ac=d.assetCat||{};
  const kpis=d.kpis||{};

  const acHTML=Object.entries(ac).filter(function(e){return e[1]>0;}).map(function(e){
    var k=e[0],v=e[1];
    const p=ta>0?Math.round(v/ta*100):0;
    return '<div class="abar"><div class="abar-lbl">'+k+'</div><div class="abar-val">'+fmt(v,sym)+'</div><div class="abar-pct">'+p+'%</div></div>';
  }).join('');

  function kpiCard(nm,val,tgtLabel,pass,disp){
    const ok=(val===null||val===undefined)?null:pass(val);
    const tag=ok===null?'<span class="kpi-tag na">N/A</span>':ok?'<span class="kpi-tag ok">✓達標</span>':'<span class="kpi-tag fail">✗未達</span>';
    const col=ok===null?'#888':ok?'#27ae60':'#e74c3c';
    const dv=disp?disp(val):(val===null||val===undefined?'N/A':val.toFixed(2));
    return '<div class="kpi"><div class="kpi-nm">'+nm+'</div><div class="kpi-bottom"><div><div class="kpi-val" style="color:'+col+'">'+dv+'</div><div class="kpi-tgt">目標: '+tgtLabel+'</div></div>'+tag+'</div></div>';
  }
  const kpiHTML=[
    kpiCard('緊急備用金',kpis.emergMths,'≥6個月',function(v){return v>=6;},function(v){return v===null?'N/A':v.toFixed(1)+'個月';}),
    kpiCard('年度儲蓄率',kpis.netSavR,'≥20%',function(v){return v>=0.2;},pct),
    kpiCard('債務收入比',kpis.debtR,'≤36%',function(v){return v<=0.36;},pct),
    kpiCard('債務負擔比',kpis.debtBurdenR,'≤40%',function(v){return v<=0.4;},pct),
    kpiCard('金融資產比',kpis.finAssetR,'≥30%',function(v){return v>=0.3;},pct),
    kpiCard('財富自由指數',kpis.wealthFreeR,'≥1.0',function(v){return v>=1;},function(v){return v===null?'N/A':v.toFixed(2);}),
    kpiCard('絕對財富比',kpis.absoluteWR,'≥1.0',function(v){return v>=1;},function(v){return v===null?'N/A':v.toFixed(2);}),
    kpiCard('靜態資產增長比',kpis.netWorthGR,'≥5%',function(v){return v>=0.05;},pct),
    kpiCard('壽險保障倍數',kpis.lifeR,'≥10倍年收入',function(v){return v>=10;},function(v){return v===null?'N/A':v.toFixed(1)+'x';}),
    kpiCard('重疾保障倍數',kpis.ciR,'≥5倍年收入',function(v){return v>=5;},function(v){return v===null?'N/A':v.toFixed(1)+'x';}),
  ].join('');

  const noteKey='note_'+rec.id;
  const savedNote=localStorage.getItem(noteKey)||'';
  det.innerHTML=
    '<div class="r-hd">'+
      '<div class="r-name">'+(d.name||rec.client_name||'客戶')+' — 家庭財務分析報告</div>'+
      '<div class="r-grid">'+
        '<div class="r-item"><label>年齡</label><value>'+(d.age||'N/A')+' 歲</value></div>'+
        '<div class="r-item"><label>職業</label><value>'+(d.job||'N/A')+'</value></div>'+
        '<div class="r-item"><label>家庭結構</label><value>'+(d.family||'N/A')+'</value></div>'+
        '<div class="r-item"><label>風險偏好</label><value>'+(d.risk||'N/A')+'</value></div>'+
        '<div class="r-item"><label>財務目標</label><value>'+(d.goals||'—')+'</value></div>'+
        '<div class="r-item"><label>報告日期</label><value>'+(d.date||'N/A')+'</value></div>'+
      '</div>'+
    '</div>'+
    '<div class="sum-cards">'+
      '<div class="sc"><div class="sc-label">總資產</div><div class="sc-val">'+fmt(ta,sym)+'</div></div>'+
      '<div class="sc"><div class="sc-label">總負債</div><div class="sc-val">'+fmt(tl,sym)+'</div></div>'+
      '<div class="sc"><div class="sc-label">淨資產</div><div class="sc-val '+(na>=0?'pos':'neg')+'">'+fmt(na,sym)+'</div></div>'+
      '<div class="sc"><div class="sc-label">年度淨現金流</div><div class="sc-val '+(ni>=0?'pos':'neg')+'">'+fmt(ni,sym)+'</div></div>'+
    '</div>'+
    (acHTML?'<div class="r-sec"><div class="r-sec-title">資產構成</div><div class="asset-wrap">'+acHTML+'</div></div>':'')+
    '<div class="r-sec"><div class="r-sec-title">收支分析</div>'+
      '<div class="two-col">'+
        '<table class="ftbl">'+
          '<tr><td class="lbl">主動收入</td><td class="pos">'+fmt(d.activeInc,sym)+'</td></tr>'+
          '<tr><td class="lbl">被動收入</td><td class="pos">'+fmt(d.passiveInc,sym)+'</td></tr>'+
          '<tr class="total"><td>總收入</td><td class="pos">'+fmt(ti,sym)+'</td></tr>'+
        '</table>'+
        '<table class="ftbl">'+
          '<tr><td class="lbl">生活開支</td><td class="neg">'+fmt(d.livingExp,sym)+'</td></tr>'+
          '<tr><td class="lbl">財務開支</td><td class="neg">'+fmt(d.finExp,sym)+'</td></tr>'+
          '<tr><td class="lbl">保險保費</td><td class="neg">'+fmt(d.totalPrem,sym)+'</td></tr>'+
          '<tr class="total"><td>總支出</td><td class="neg">'+fmt(te,sym)+'</td></tr>'+
        '</table>'+
      '</div>'+
    '</div>'+
    '<div class="r-sec"><div class="r-sec-title">財務健康指標 (10項)</div><div class="kpi-grid">'+kpiHTML+'</div></div>'+
    '<div class="notes" data-rid="'+rec.id+'"><div class="r-sec-title">顧問備註</div>'+
      '<textarea id="note-ta" placeholder="輸入跟進備註、建議或重要信息…">'+savedNote+'</textarea>'+
      '<div class="notes-btns">'+
        '<button class="btn-save btn-save-btn">儲存備註</button>'+
        '<button class="btn-pdf" id="btn-print">🖨 列印 PDF</button>'+
        '<span class="save-ok" id="save-ok">✓ 已儲存</span>'+
      '</div>'+
    '</div>';
}
function saveNote(id){
  const ta=document.getElementById('note-ta');
  if(!ta)return;
  localStorage.setItem('note_'+id,ta.value);
  const ok=document.getElementById('save-ok');
  if(ok){ok.style.opacity='1';setTimeout(function(){ok.style.opacity='0';},2000);}
}

// Event delegation - handles dynamically generated elements
document.addEventListener('click',function(e){
  var ci=e.target.closest('.ci');
  if(ci&&ci.dataset.id){showReport(ci.dataset.id);return;}
  var sb=e.target.closest('.btn-save-btn');
  if(sb){var notes=sb.closest('.notes');if(notes&&notes.dataset.rid)saveNote(notes.dataset.rid);return;}
  var pb=e.target.closest('.btn-pdf');
  if(pb){window.print();return;}
});
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('pw-screen').style.display!=='none')checkPw();
});
</script>
</body>
</html>
