<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Janet Chen · 顧問後台</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0e0c;color:#e8e0d0;font-size:13px}
:root{--gold:#d4af37;--green:#27ae60;--red:#e74c3c;--bg2:#1a1810;--border:#2a2820;--blue:#4a9edd}
#pw-screen{position:fixed;inset:0;background:#0f0e0c;display:flex;align-items:center;justify-content:center;z-index:9999}
.pw-box{background:#1a1810;border:1.5px solid var(--gold);border-radius:16px;padding:40px 48px;text-align:center;width:360px}
.pw-logo{font-size:2.5rem;margin-bottom:10px}
.pw-box h2{color:var(--gold);font-size:1rem;margin-bottom:6px;letter-spacing:.06em}
.pw-box p{color:#888;font-size:.78rem;margin-bottom:22px}
.pw-input{width:100%;background:#0f0e0c;border:1.5px solid #333;border-radius:8px;padding:10px 14px;color:#e8e0d0;font-size:1rem;outline:none;margin-bottom:12px;text-align:center;letter-spacing:.2em}
.pw-input:focus{border-color:var(--gold)}
.pw-btn{width:100%;padding:10px;background:linear-gradient(135deg,#1a6b3a,#27ae60);border:none;border-radius:8px;color:#fff;font-size:.9rem;font-weight:700;cursor:pointer}
.pw-error{color:var(--red);font-size:.78rem;margin-top:10px;min-height:18px}
#app{display:none;height:100vh;flex-direction:column;overflow:hidden}
.topbar{height:46px;background:#1a1810;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.topbar h1{font-size:.82rem;color:var(--gold);font-weight:700;letter-spacing:.05em}
.tb-badge{background:#1a3a25;color:#5dbb7a;font-size:.62rem;padding:2px 8px;border-radius:20px;font-weight:700}
.tb-count{margin-left:auto;color:#555;font-size:.72rem}
.tb-logout{color:#555;font-size:.72rem;cursor:pointer;padding:3px 8px;border:1px solid #2a2820;border-radius:4px}
.tb-logout:hover{color:#aaa}
.btn-del{padding:3px 10px;background:#3a1a1a;border:1px solid #e74c3c;border-radius:5px;color:#e74c3c;font-size:.7rem;cursor:pointer;font-weight:600;transition:all .15s}
.btn-del:hover{background:#e74c3c;color:#fff}
.del-confirm{display:none;background:#3a1a1a;border:1px solid #e74c3c;border-radius:8px;padding:14px 18px;margin:10px 0;font-size:.8rem}
.del-confirm p{color:#e8a090;margin-bottom:10px}
.del-confirm-btns{display:flex;gap:8px}
.btn-del-yes{padding:5px 16px;background:#e74c3c;border:none;border-radius:5px;color:#fff;font-size:.76rem;font-weight:700;cursor:pointer}
.btn-del-no{padding:5px 14px;background:#1a1810;border:1px solid #444;border-radius:5px;color:#888;font-size:.76rem;cursor:pointer}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:#111009;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-hd{padding:9px 12px;border-bottom:1px solid var(--border);font-size:.66rem;color:#555;text-transform:uppercase;letter-spacing:.08em}
.sb-search input{width:100%;background:#0f0e0c;border:none;border-bottom:1px solid var(--border);padding:8px 12px;color:#e8e0d0;font-size:.78rem;outline:none}
.sb-search input:focus{border-bottom-color:var(--gold)}
.cl{flex:1;overflow-y:auto}
.ci{padding:9px 12px;border-bottom:1px solid #171510;cursor:pointer;border-left:3px solid transparent;transition:background .12s}
.ci:hover{background:#1a1810}
.ci.active{background:#1e1c12;border-left-color:var(--gold)}
.ci-name{font-size:.82rem;font-weight:600;color:#e0d8c8}
.ci.active .ci-name{color:var(--gold)}
.ci-sub{display:flex;justify-content:space-between;margin-top:2px}
.ci-date{font-size:.66rem;color:#555}
.ci-net{font-size:.7rem;font-weight:600}
.detail{flex:1;overflow-y:auto;padding:16px 20px;background:#0f0e0c}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#333;gap:10px;font-size:.85rem}
.empty-arrow{font-size:2rem;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:.8}}
/* Report layout */
.rpt{max-width:900px}
.sec{background:#1a1810;border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:12px}
.sec-title{font-size:.72rem;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sec-title:before{content:'';width:3px;height:12px;background:var(--gold);border-radius:2px;flex-shrink:0}
/* Header */
.r-name{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:12px}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.info-item label{font-size:.62rem;color:#666;text-transform:uppercase;letter-spacing:.04em}
.info-item value{display:block;font-size:.8rem;color:#e0d8c8;font-weight:600;margin-top:2px}
/* Summary cards */
.sum4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.scard{background:#1a1810;border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.scard-lbl{font-size:.62rem;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.scard-val{font-size:.9rem;font-weight:700}
.pos{color:var(--green)}
.neg{color:var(--red)}
.neu{color:#e0d8c8}
/* Two column layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:.76rem}
.tbl td{padding:4px 6px;border-bottom:1px solid #1e1c14}
.tbl td:last-child{text-align:right;font-weight:600}
.tbl .lbl{color:#888}
.tbl .sub{color:#aaa;padding-left:16px}
.tbl .grp{color:var(--gold);font-weight:700;background:#141210;padding:6px 6px 4px}
.tbl .grp td:last-child{color:var(--gold)}
.tbl .tot{border-top:1px solid #2a2820;padding-top:6px}
.tbl .tot td{font-weight:700;color:var(--gold)}
/* Asset bars */
.asset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
.abar{background:#141210;border:1px solid var(--border);border-radius:7px;padding:8px 10px}
.abar-lbl{font-size:.62rem;color:#888;margin-bottom:4px;line-height:1.3}
.abar-val{font-size:.78rem;font-weight:700;color:var(--gold)}
.abar-pct{font-size:.62rem;color:#555;margin-top:2px}
.abar-bar{height:3px;background:#2a2820;border-radius:2px;margin-top:4px;overflow:hidden}
.abar-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
.lbl.grp2{color:#d4af37;font-weight:600;font-size:.68rem;padding-top:5px;padding-left:4px}.lbl.sub2{color:#aaa;padding-left:20px;font-size:.73rem}
/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.kpi{background:#141210;border:1px solid var(--border);border-radius:7px;padding:9px 10px}
.kpi-nm{font-size:.65rem;color:#888;margin-bottom:6px;line-height:1.3;min-height:26px}
.kpi-val{font-size:.86rem;font-weight:700;margin-bottom:3px}
.kpi-tgt{font-size:.6rem;color:#555}
.kpi-tag{font-size:.6rem;padding:2px 6px;border-radius:6px;font-weight:700;display:inline-block;margin-top:4px}
.kpi-tag.ok{background:#1a3a25;color:#5dbb7a}
.kpi-tag.fail{background:#3a1a1a;color:#e07070}
.kpi-tag.na{background:#222;color:#555}
/* Insurance */
.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ins-card{background:#141210;border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.ins-card-title{font-size:.68rem;color:#888;margin-bottom:6px}
.ins-card-val{font-size:.9rem;font-weight:700;color:var(--gold)}
.ins-card-sub{font-size:.65rem;color:#555;margin-top:2px}
/* Notes */
.notes-area textarea{width:100%;background:#0f0e0c;border:1px solid #2a2820;border-radius:6px;padding:8px 10px;color:#e8e0d0;font-size:.78rem;resize:vertical;min-height:70px;outline:none;font-family:inherit}
.notes-area textarea:focus{border-color:var(--gold)}
.notes-btns{display:flex;gap:8px;margin-top:8px;align-items:center}
.btn-save{padding:5px 14px;background:linear-gradient(135deg,#1a6b3a,#27ae60);border:none;border-radius:5px;color:#fff;font-size:.74rem;font-weight:700;cursor:pointer}
.btn-pdf{padding:5px 14px;background:#1a1810;border:1px solid var(--gold);border-radius:5px;color:var(--gold);font-size:.74rem;cursor:pointer}
.save-ok{color:var(--green);font-size:.7rem;opacity:0;transition:opacity .3s}
@media print{#pw-screen,#app .topbar,.sidebar,.notes-btns{display:none!important}.main{display:block!important}.detail{overflow:visible!important;padding:0!important}}</style>
</head>
<body>
<div id="pw-screen">
  <div class="pw-box">
    <div class="pw-logo">🔒</div>
    <h2>Janet Chen · 顧問後台</h2>
    <p>請輸入密碼以進入客戶財務報告系統</p>
    <input class="pw-input" type="password" id="pw-inp" placeholder="••••••••" autocomplete="off">
    <button class="pw-btn" onclick="checkPw()">登錄 &rarr;</button>
    <div class="pw-error" id="pw-err"></div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <h1>Janet Chen &middot; 顧問後台 &middot; 客戶財務報告</h1>
    <span class="tb-badge">保誠 IH5039</span>
    <span class="tb-count" id="rec-count"></span>
    <span class="tb-logout" onclick="logout()">退出</span>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sb-hd">客戶列表</div>
      <div class="sb-search"><input type="search" id="srch" placeholder="🔍 搜尋姓名…" oninput="filterList()"></div>
      <div class="cl" id="cl"><div style="padding:20px;text-align:center;color:#444;font-size:.75rem">載入中…</div></div>
    </div>
    <div class="detail" id="detail">
      <div class="empty"><div class="empty-arrow">←</div><div>選擇左側客戶查看完整報告</div></div>
    </div>
  </div>
</div>

<script>
const SUPA_URL='https://harfpcpncdgsseebfsku.supabase.co';
const SUPA_KEY='sb_publishable_XU4HW7YIninAmvzGVbs2GA_ejscsrnu';
const PW='janet2025';
let allRecords=[], activeId=null;

function checkPw(){
  const v=document.getElementById('pw-inp').value;
  if(v===PW){
    document.getElementById('pw-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    loadData();
  }else{
    document.getElementById('pw-err').textContent='密碼錯誤，請重試';
    document.getElementById('pw-inp').value='';
    document.getElementById('pw-inp').focus();
  }
}
function logout(){
  document.getElementById('app').style.display='none';
  document.getElementById('pw-screen').style.display='flex';
  document.getElementById('pw-inp').value='';
}
async function loadData(){
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/finance_reports?select=*&order=created_at.desc',{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    allRecords=await r.json();
    document.getElementById('rec-count').textContent=allRecords.length+' 個客戶';
    renderList(allRecords);
  }catch(e){
    document.getElementById('cl').innerHTML='<div style="padding:16px;color:#e74c3c">載入失敗: '+e.message+'</div>';
  }
}
function filterList(){
  const q=document.getElementById('srch').value.toLowerCase();
  renderList(allRecords.filter(r=>(r.client_name||'').toLowerCase().includes(q)));
}
function fmt(n,sym){
  sym=sym||'HKD';
  if(n===null||n===undefined||n==='')return 'N/A';
  return sym+' '+Number(n).toLocaleString('en-HK',{maximumFractionDigits:0});
}
function pct(n,dec){
  if(n===null||n===undefined)return 'N/A';
  return (n*100).toFixed(dec===undefined?1:dec)+'%';
}
function row2(l,v,cls){
  cls=cls||'';
  return '<tr><td class="lbl">'+l+'</td><td class="'+(cls||'')+'">'+v+'</td></tr>';
}
function renderList(records){
  const cl=document.getElementById('cl');
  if(!records.length){cl.innerHTML='<div style="padding:20px;text-align:center;color:#444;font-size:.75rem">無記錄</div>';return;}
  cl.innerHTML=records.map(r=>{
    const d=r.report_data||{};
    const na=d.netAssets||r.net_assets||0;
    const sym=d.cur_sym||'HKD';
    const dt=new Date(r.created_at);
    const ds=dt.getFullYear()+'-'+(dt.getMonth()+1).toString().padStart(2,'0')+'-'+dt.getDate().toString().padStart(2,'0');
    const col=na>=0?'#7ab88a':'#e74c3c';
    return '<div class="ci'+(r.id===activeId?' active':'')+'" data-id="'+r.id+'">'
      +'<div class="ci-name">'+(r.client_name||d.name||'未命名')+'</div>'
      +'<div class="ci-sub"><span class="ci-date">'+ds+'</span><span class="ci-net" style="color:'+col+'">'+sym+' '+Number(na).toLocaleString('en-HK',{maximumFractionDigits:0})+'</span><button class="btn-del" data-del="'+r.id+'">删除</button></div>'
      +'</div>';
  }).join('');
}

function kpiCard(nm,val,tgt,pass,disp){
  const ok=(val===null||val===undefined)?null:pass(val);
  const col=ok===null?'#888':ok?'#27ae60':'#e74c3c';
  const tag=ok===null?'<span class="kpi-tag na">數據不足</span>':ok?'<span class="kpi-tag ok">✓ 達標</span>':'<span class="kpi-tag fail">✗ 未達</span>';
  const dv=disp?disp(val):(val===null||val===undefined?'N/A':val.toFixed(2));
  return '<div class="kpi"><div class="kpi-nm">'+nm+'</div><div class="kpi-val" style="color:'+col+'">'+dv+'</div><div class="kpi-tgt">目標: '+tgt+'</div>'+tag+'</div>';
}


// ── 生成「財務建議與行動計劃」HTML ──
function genAdvisorActions(d, kpis, sym) {
  const actions = [];
  const suggestions = [];

  // ── 緊急建議（紅色警示）──
  if (kpis.emergMths !== null && kpis.emergMths < 3) {
    actions.push({
      priority: 'urgent',
      icon: '🚨',
      category: '緊急儲備',
      action: '緊急建立應急備用金，目前僅 ' + (kpis.emergMths||0).toFixed(1) + ' 個月，需補足至6個月月支出（約' + fmt((d.livingExp||0)/2*6, sym) + '）',
      timeline: '1個月內',
      reason: '一旦收入中斷，家庭財務將面臨嚴重壓力'
    });
  } else if (kpis.emergMths !== null && kpis.emergMths < 6) {
    actions.push({
      priority: 'high',
      icon: '⚠️',
      category: '緊急儲備',
      action: '補足應急備用金至6個月月支出，目前 ' + kpis.emergMths.toFixed(1) + ' 個月，差額約 ' + fmt(Math.max(0,(6-kpis.emergMths)*(d.livingExp||0)/12), sym),
      timeline: '3個月內',
      reason: '建議存入活期存款或貨幣基金，保持流動性'
    });
  }

  // ── 壽險保障 ──
  if (kpis.lifeR !== null && kpis.lifeR < 5) {
    actions.push({
      priority: 'urgent',
      icon: '🚨',
      category: '壽險保障',
      action: '壽險嚴重不足（當前 ' + kpis.lifeR.toFixed(1) + 'x，標準≥10x），需立即補充定期壽險，建議保額不低於 ' + fmt((d.totalInc||0)*10, sym),
      timeline: '1個月內',
      reason: '家庭主要收入來源若發生意外，家人將面臨財務危機'
    });
  } else if (kpis.lifeR !== null && kpis.lifeR < 10) {
    actions.push({
      priority: 'high',
      icon: '⚠️',
      category: '壽險保障',
      action: '壽險保障不足（當前 ' + kpis.lifeR.toFixed(1) + 'x，標準≥10x），建議補充定期壽險至年收入10倍',
      timeline: '2個月內',
      reason: '可考慮保誠定期壽險，保費低廉保障高'
    });
  } else if (kpis.lifeR !== null && kpis.lifeR >= 10) {
    suggestions.push({ icon: '✅', category: '壽險保障', text: '壽險保障充足（' + kpis.lifeR.toFixed(1) + 'x），達標' });
  }

  // ── 重疾保障 ──
  if (kpis.ciR !== null && kpis.ciR < 2) {
    actions.push({
      priority: 'urgent',
      icon: '🚨',
      category: '重疾保障',
      action: '重疾保障嚴重不足（當前 ' + kpis.ciR.toFixed(1) + 'x，標準≥5x），需補充重疾險，目標保額 ' + fmt((d.totalInc||0)*5, sym),
      timeline: '1個月內',
      reason: '重疾治療費用高昂，保障不足將消耗大量積蓄'
    });
  } else if (kpis.ciR !== null && kpis.ciR < 5) {
    actions.push({
      priority: 'high',
      icon: '⚠️',
      category: '重疾保障',
      action: '重疾保障不足（當前 ' + kpis.ciR.toFixed(1) + 'x，標準≥5x），建議補充至年收入300%-500%',
      timeline: '2個月內',
      reason: '可評估保誠危疾保障計劃，一次性賠付更靈活'
    });
  } else if (kpis.ciR !== null && kpis.ciR >= 5) {
    suggestions.push({ icon: '✅', category: '重疾保障', text: '重疾保障充足（' + kpis.ciR.toFixed(1) + 'x），達標' });
  }

  // ── 債務管理 ──
  if (kpis.debtR !== null && kpis.debtR > 0.5) {
    actions.push({
      priority: 'urgent',
      icon: '🚨',
      category: '債務管理',
      action: '債務收入比過高（' + (kpis.debtR*100).toFixed(0) + '%，警戒線36%），需制定還款優先計劃，優先清還高息負債（信用卡、個人貸款）',
      timeline: '立即執行',
      reason: '高債務比率嚴重影響財務靈活性及抗風險能力'
    });
  } else if (kpis.debtR !== null && kpis.debtR > 0.36) {
    actions.push({
      priority: 'medium',
      icon: '📋',
      category: '債務管理',
      action: '債務收入比偏高（' + (kpis.debtR*100).toFixed(0) + '%），建議制定還款計劃，逐步降低至36%以下',
      timeline: '3-6個月',
      reason: '建議優先還清信用卡欠款，再考慮投資增值'
    });
  } else if (kpis.debtR !== null) {
    suggestions.push({ icon: '✅', category: '債務管理', text: '債務收入比健康（' + (kpis.debtR*100).toFixed(0) + '%），達標' });
  }

  // ── 儲蓄率 ──
  if (kpis.netSavR !== null && kpis.netSavR < 0.05) {
    actions.push({
      priority: 'urgent',
      icon: '🚨',
      category: '儲蓄計劃',
      action: '年度儲蓄率極低（' + (kpis.netSavR*100).toFixed(0) + '%），需立即審視支出結構，制定強制儲蓄計劃，目標每月自動轉存至少收入的10%',
      timeline: '本月起執行',
      reason: '儲蓄率過低將無法積累財富，難以應對未來財務目標'
    });
  } else if (kpis.netSavR !== null && kpis.netSavR < 0.2) {
    actions.push({
      priority: 'medium',
      icon: '📋',
      category: '儲蓄計劃',
      action: '年度儲蓄率偏低（' + (kpis.netSavR*100).toFixed(0) + '%，目標≥20%），建議審視非必要支出，每月設置自動儲蓄轉賬',
      timeline: '1個月內',
      reason: '可嘗試「先儲後花」策略，設置自動扣賬'
    });
  } else if (kpis.netSavR !== null) {
    suggestions.push({ icon: '✅', category: '儲蓄計劃', text: '年度儲蓄率良好（' + (kpis.netSavR*100).toFixed(0) + '%），達標' });
  }

  // ── 資產結構 ──
  if (kpis.finAssetR !== null && kpis.finAssetR < 0.3) {
    actions.push({
      priority: 'medium',
      icon: '📋',
      category: '資產結構',
      action: '金融資產佔比偏低（' + (kpis.finAssetR*100).toFixed(0) + '%，目標≥30%），資產過度集中於實物資產，建議逐步提高流動性金融資產比例',
      timeline: '3-6個月',
      reason: '實物資產流動性差，建議增加儲蓄保單、基金等金融資產配置'
    });
  }

  // ── 財富自由 ──
  if (kpis.wealthFreeR !== null && kpis.wealthFreeR < 0.3) {
    actions.push({
      priority: 'medium',
      icon: '📋',
      category: '被動收入',
      action: '財富自由指數極低（' + kpis.wealthFreeR.toFixed(2) + '），被動收入遠不足以覆蓋生活支出，建議規劃被動收入來源（儲蓄保單、年金、投資物業）',
      timeline: '6-12個月',
      reason: '長期目標：被動收入≥生活支出，實現財務自由'
    });
  } else if (kpis.wealthFreeR !== null && kpis.wealthFreeR >= 1) {
    suggestions.push({ icon: '🌟', category: '財富自由', text: '財富自由指數達標（' + kpis.wealthFreeR.toFixed(2) + '），被動收入已可覆蓋生活支出！' });
  }

  // ── 生成 HTML ──
  const urgentActions = actions.filter(a => a.priority === 'urgent');
  const highActions = actions.filter(a => a.priority === 'high');
  const mediumActions = actions.filter(a => a.priority === 'medium');

  const priorityColor = { urgent: '#e74c3c', high: '#e67e22', medium: '#3498db' };
  const priorityBg = { urgent: 'rgba(231,76,60,0.08)', high: 'rgba(230,126,34,0.08)', medium: 'rgba(52,152,219,0.08)' };
  const priorityLabel = { urgent: '緊急', high: '重要', medium: '建議' };

  let html = '<div class="sec"><div class="sec-title">💡 財務建議與行動計劃</div>';

  if (actions.length === 0 && suggestions.length === 0) {
    html += '<div style="padding:16px;text-align:center;color:#888;font-size:.85rem">暫無數據生成建議，請確認報告數據已完整填寫</div>';
  }

  // 行動項目
  if (actions.length > 0) {
    html += '<div style="margin-bottom:12px;font-size:.78rem;color:#888">共 ' + actions.length + ' 項待處理事項</div>';
    [...urgentActions, ...highActions, ...mediumActions].forEach((item, i) => {
      html += '<div style="display:flex;gap:10px;padding:12px 14px;margin-bottom:8px;border-radius:10px;'
        + 'background:' + priorityBg[item.priority] + ';'
        + 'border-left:3px solid ' + priorityColor[item.priority] + '">'
        + '<div style="font-size:1.2rem;flex-shrink:0;margin-top:1px">' + item.icon + '</div>'
        + '<div style="flex:1">'
          + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
            + '<span style="font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:10px;'
              + 'background:' + priorityColor[item.priority] + ';color:#fff">' + priorityLabel[item.priority] + '</span>'
            + '<span style="font-size:.72rem;color:#888;font-weight:600">' + item.category + '</span>'
          + '</div>'
          + '<div style="font-size:.83rem;line-height:1.6;color:#222;margin-bottom:4px">' + item.action + '</div>'
          + '<div style="display:flex;gap:12px;font-size:.72rem;color:#888">'
            + '<span>⏰ ' + item.timeline + '</span>'
            + '<span>💬 ' + item.reason + '</span>'
          + '</div>'
        + '</div>'
        + '</div>';
    });
  }

  // 已達標項目
  if (suggestions.length > 0) {
    html += '<div style="margin-top:10px;padding:10px 14px;background:rgba(39,174,96,0.06);border-radius:10px;border:1px solid rgba(39,174,96,0.2)">'
      + '<div style="font-size:.75rem;font-weight:700;color:#27ae60;margin-bottom:8px">✅ 已達標項目</div>'
      + suggestions.map(s =>
          '<div style="font-size:.78rem;color:#555;padding:3px 0">' + s.icon + ' <strong>' + s.category + '</strong>：' + s.text + '</div>'
        ).join('')
      + '</div>';
  }

  html += '</div>';
  return html;
}

async function deleteRecord(id){
  if(!confirm('確定要刪除這份報告嗎？操作不可還原。')){return;}
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/finance_reports?id=eq.'+id,{
      method:'DELETE',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    if(r.ok||r.status===204){
      allRecords=allRecords.filter(function(rec){return rec.id!==id;});
      document.getElementById('rec-count').textContent=allRecords.length+' 個客戶';
      if(activeId===id){
        activeId=null;
        document.getElementById('detail').innerHTML='<div class="empty"><div class="empty-arrow">←</div><div>報告已刪除，請選擇其他客戶</div></div>';
      }
      filterList();
    }else{
      alert('刪除失敗，請稍後再試');
    }
  }catch(e2){alert('網絡異常，請重試');}
}

document.addEventListener('click',function(e){
  // Delete button - must check before .ci to prevent event bubbling
  const db=e.target.closest('.btn-del');
  if(db&&db.dataset.del){e.stopPropagation();deleteRecord(db.dataset.del);return;}
  const ci=e.target.closest('.ci');
  if(ci&&ci.dataset.id){showReport(ci.dataset.id);return;}
  const sb=e.target.closest('.btn-save-btn');
  if(sb){const notes=sb.closest('.notes-area');if(notes&&notes.dataset.rid)saveNote(notes.dataset.rid);return;}
  const pb=e.target.closest('.btn-pdf');
  if(pb){window.print();return;}
});

async function deleteRecord(id){
  if(!confirm('確定要刪除這份報告嗎？操作不可還原。')){return;}
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/finance_reports?id=eq.'+id,{
      method:'DELETE',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    if(r.ok||r.status===204){
      allRecords=allRecords.filter(function(rec){return rec.id!==id;});
      document.getElementById('rec-count').textContent=allRecords.length+' 個客戶';
      if(activeId===id){
        activeId=null;
        document.getElementById('detail').innerHTML='<div class="empty"><div class="empty-arrow">←</div><div>報告已刪除，請選擇其他客戶</div></div>';
      }
      filterList();
    }else{
      alert('刪除失敗，請稍後再試');
    }
  }catch(e2){alert('網絡異常，請重試');}
}

document.addEventListener('click',function(e){
  // Delete button - must check before .ci to prevent event bubbling
  const db=e.target.closest('.btn-del');
  if(db&&db.dataset.del){e.stopPropagation();deleteRecord(db.dataset.del);return;}
  const ci=e.target.closest('.ci');
  if(ci&&ci.dataset.id){showReport(ci.dataset.id);return;}
  const sb=e.target.closest('.btn-save-btn');
  if(sb){const notes=sb.closest('.notes-area');if(notes&&notes.dataset.rid)saveNote(notes.dataset.rid);return;}
  const pb=e.target.closest('.btn-pdf');
  if(pb){window.print();return;}
});

      +(dins.k_med_amt>0||dins.k_med_prem>0?'<tr><td class="lbl sub2">子女醫療险</td><td class="neu" style="text-align:right">'+fmt(dins.k_med_amt,sym)+'</td><td class="neu" style="text-align:right;font-size:.7rem;color:#888">'+fmt(dins.k_med_prem,sym)+'</td></tr>':'')
      +'<tr class="tot"><td>合計保障</td><td style="text-align:right" class="pos">'+fmt(d.lifeCover+d.ciCover,sym)+'</td><td style="text-align:right" class="neg">'+fmt(d.totalPrem,sym)+'</td></tr>'
    +'</table>'
  +'</div>'
  // ── 7. 10項健康指標 ──
  +'<div class="sec"><div class="sec-title">財務健康指標（10項）</div><div class="kpi-grid">'+kpiHTML+'</div></div>'
  // ── 8. 顧問備註 ──
  +'<div class="sec notes-area" data-rid="'+rec.id+'"><div class="sec-title">顧問備註</div>'
    +'<textarea id="note-ta" placeholder="輸入跟進備註、建議事項或重要信息…">'+savedNote+'</textarea>'
    +'<div class="notes-btns">'
      +'<button class="btn-save btn-save-btn">儲存備註</button>'
      +'<button class="btn-pdf">🖨 列印 / PDF</button>'
      +'<span class="save-ok" id="save-ok">✓ 已儲存</span>'
    +'</div>'
  +'</div>'
  +'</div>';
}

function saveNote(id){
  const ta=document.getElementById('note-ta');
  if(!ta)return;
  localStorage.setItem('note_'+id,ta.value);
  const ok=document.getElementById('save-ok');
  if(ok){ok.style.opacity='1';setTimeout(()=>ok.style.opacity='0',2000);}
}

async function deleteRecord(id){
  if(!confirm('確定要刪除這份報告嗎？操作不可還原。')){return;}
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/finance_reports?id=eq.'+id,{
      method:'DELETE',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    if(r.ok||r.status===204){
      allRecords=allRecords.filter(function(rec){return rec.id!==id;});
      document.getElementById('rec-count').textContent=allRecords.length+' 個客戶';
      if(activeId===id){
        activeId=null;
        document.getElementById('detail').innerHTML='<div class="empty"><div class="empty-arrow">←</div><div>報告已刪除，請選擇其他客戶</div></div>';
      }
      filterList();
    }else{
      alert('刪除失敗，請稍後再試');
    }
  }catch(e2){alert('網絡異常，請重試');}
}

document.addEventListener('click',function(e){
  // Delete button - must check before .ci to prevent event bubbling
  const db=e.target.closest('.btn-del');
  if(db&&db.dataset.del){e.stopPropagation();deleteRecord(db.dataset.del);return;}
  const ci=e.target.closest('.ci');
  if(ci&&ci.dataset.id){showReport(ci.dataset.id);return;}
  const sb=e.target.closest('.btn-save-btn');
  if(sb){const notes=sb.closest('.notes-area');if(notes&&notes.dataset.rid)saveNote(notes.dataset.rid);return;}
  const pb=e.target.closest('.btn-pdf');
  if(pb){window.print();return;}
});
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('pw-screen').style.display!=='none')checkPw();
});
</script>
